<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaDeT - Language Detection & Translation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .main-card{
            width:100%;
            max-width:900px;
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(20px);
            border-radius:25px;
            padding:40px;
            color:white;
            box-shadow:0 20px 60px rgba(0,0,0,.25);
        }

        h1{
            font-weight:700;
        }

        .subtitle{
            opacity:.8;
            margin-bottom:30px;
        }

        label{
            font-weight:600;
            margin-bottom:8px;
        }

        textarea{
            resize:none;
            height:170px;
        }

        textarea,
        select{
            border-radius:15px!important;
            padding:15px!important;
        }

        textarea:focus,
        select:focus{
            box-shadow:0 0 15px rgba(255,255,255,.4)!important;
        }

        .btn-custom{
            width:100%;
            border:none;
            border-radius:15px;
            padding:15px;
            font-size:18px;
            font-weight:600;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            transition:.3s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(0,114,255,.4);
        }

        .result-box{
            margin-top:35px;
            background:white;
            color:#333;
            border-radius:18px;
            padding:25px;
        }

        .result-box h5{
            color:#0d6efd;
            font-weight:700;
        }

        .translation{
            background:#f5f7fb;
            border-radius:12px;
            padding:18px;
            font-size:18px;
            margin-top:10px;
        }

        .icon{
            font-size:60px;
            margin-bottom:15px;
            color:white;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            opacity:.8;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="main-card">

    <div class="text-center">
        <i class="fas fa-language icon"></i>
        <h1>LaDeT</h1>
        <p class="subtitle">
            Language Detection & Translation
        </p>
    </div>

    <form action="/trans" method="POST">

        <div class="mb-4">
            <label>
                <i class="fas fa-keyboard"></i>
                Enter Text
            </label>

            <textarea
                class="form-control"
                name="text"
                placeholder="Type or paste any text here..."
                required></textarea>
        </div>

        <div class="mb-4">
            <label>
                <i class="fas fa-globe"></i>
                Target Language
            </label>

            <select
                class="form-select"
                name="target_lang"
                required>

                {% for lang_code, lang_name in languages.items() %}
                    <option value="{{ lang_code }}">
                        {{ lang_name }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <button class="btn btn-custom">
            <i class="fas fa-right-left"></i>
            Detect & Translate
        </button>

    </form>

    {% if translation %}

    <div class="result-box">

        <h5>
            <i class="fas fa-magnifying-glass"></i>
            Detected Language
        </h5>

        <p class="fs-5">{{ detected_lang }}</p>

        <hr>

        <h5>
            <i class="fas fa-language"></i>
            Translation
        </h5>

        <div class="translation">
            {{ translation }}
        </div>

    </div>

    {% endif %}

    <div class="footer">
        Made using Flask • LangDetect • Deep Translator
    </div>

</div>

</body>
</html>
