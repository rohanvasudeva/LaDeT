<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaDeT | Language Detection & Translation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#FAEBD7;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Segoe UI",sans-serif;
}

.main-card{

    width:90%;
    max-width:950px;
    max-height:95vh;

    overflow:auto;

    background:white;
    border-radius:25px;

    padding:30px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.15);

    border-top:8px solid #E67E22;
}

.title{

    text-align:center;
    margin-bottom:30px;

}

.title i{

    font-size:65px;
    color:#E67E22;

}

.title h1{

    color:#222;
    font-weight:700;
    margin-top:10px;

}

.subtitle{

    color:#666;
    margin-top:8px;

}

label{

    color:#222;
    font-weight:600;
    margin-bottom:8px;

}

textarea{

    resize:none;
    height:130px;

}

.form-control,
.form-select{

    border-radius:15px;
    padding:14px;
    border:2px solid #ddd;

}

.form-control:focus,
.form-select:focus{

    border-color:#E67E22;
    box-shadow:0 0 10px rgba(230,126,34,.2);

}

.btn-custom{

    width:100%;

    background:#E67E22;
    color:white;

    border:none;

    border-radius:15px;

    padding:14px;

    font-size:18px;
    font-weight:600;

    transition:.25s;

}

.btn-custom:hover{

    background:#D35400;
    transform:translateY(-2px);

}

.result-box{

    margin-top:25px;

    border-radius:18px;

    background:#FFF7EE;

    border-left:6px solid #E67E22;

    padding:22px;

}

.result-title{

    color:#E67E22;
    font-size:20px;
    font-weight:700;
    margin-bottom:10px;

}

.detected{

    font-size:18px;
    color:#333;

}

.translation{

    margin-top:10px;

    background:white;

    border-radius:12px;

    padding:15px;

    border:1px solid #ddd;

    max-height:180px;

    overflow-y:auto;

    color:#222;

    line-height:1.6;

}

.footer{

    text-align:center;

    margin-top:25px;

    color:#666;

    font-size:14px;

}

hr{

    border-top:1px solid #ddd;

}

</style>

</head>

<body>

<div class="main-card">

<div class="title">

<i class="fa-solid fa-language"></i>

<h1>LaDeT</h1>

<p class="subtitle">

Language Detection & Translation

</p>

</div>

<form action="/trans" method="POST">

<div class="mb-4">

<label>

<i class="fa-solid fa-keyboard"></i>

Enter Text

</label>

<textarea
class="form-control"
name="text"
placeholder="Type or paste text here..."
required></textarea>

</div>

<div class="mb-4">

<label>

<i class="fa-solid fa-earth-americas"></i>

Target Language

</label>

<select
class="form-select"
name="target_lang"
required>

{% for lang_code, lang_name in languages.items() %}

<option value="{{ lang_code }}">

{{ lang_name }}

</option>

{% endfor %}

</select>

</div>

<button class="btn btn-custom">

<i class="fa-solid fa-right-left"></i>

Detect & Translate

</button>

</form>

{% if translation %}

<div class="result-box">

<div class="result-title">

<i class="fa-solid fa-magnifying-glass"></i>

Detected Language

</div>

<p class="detected">

{{ detected_lang }}

</p>

<hr>

<div class="result-title">

<i class="fa-solid fa-language"></i>

Translation

</div>

<div class="translation">

{{ translation }}

</div>

</div>

{% endif %}

<div class="footer">

Made using <b>Flask</b> • <b>LangDetect</b> • <b>Deep Translator</b>

</div>

</div>

</body>
</html>
